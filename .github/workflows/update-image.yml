name: Update CliRelay Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no new version'
        required: false
        default: false
        type: boolean
      publish_to_store:
        description: 'Publish to LazyCat App Store'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 */6 * * *'

env:
  UPSTREAM_REPO: kittors/CliRelay
  PROJECT_NAME: CliRelay
  PROJECT_NAME_LOWER: clirelay
  OFFICIAL_IMAGE_REGISTRY: ""
  PRECOMPILED_BINARY_URL: ""
  DOCKERFILE_TYPE: custom
  SERVICE_PORT: "8317"
  SERVICE_CMD: '["/CLIProxyAPI/CLIProxyAPI"]'

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest upstream commit
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching latest commit from upstream..."
          
          COMMIT_RESPONSE=$(gh api "repos/${{ env.UPSTREAM_REPO }}/commits?per_page=1" 2>&1 || true)
          if echo "$COMMIT_RESPONSE" | jq -e '.[0].sha' >/dev/null 2>&1; then
            LATEST_COMMIT=$(echo "$COMMIT_RESPONSE" | jq -r '.[0].sha' | cut -c1-7)
            COMMIT_DATE=$(echo "$COMMIT_RESPONSE" | jq -r '.[0].commit.author.date')
            echo "Latest commit: $LATEST_COMMIT"
            echo "Commit date: $COMMIT_DATE"
            echo "latest_version=$LATEST_COMMIT" >> $GITHUB_OUTPUT
            echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          else
            echo "Failed to fetch upstream commits"
            exit 1
          fi

      - name: Check if update needed
        id: check-update
        run: |
          CURRENT_IMAGE=$(grep 'image:' lzc-manifest.yml | head -1 | awk '{print $2}')
          echo "Current image: $CURRENT_IMAGE"

          LATEST_COMMIT="${{ steps.get-version.outputs.latest_version }}"
          FORCE_BUILD="${{ inputs.force_build }}"

          if [ "$FORCE_BUILD" = "true" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Force build requested"
          elif [ -n "$LATEST_COMMIT" ] && [[ "$CURRENT_IMAGE" != *"$LATEST_COMMIT"* ]]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New commit available: $LATEST_COMMIT"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "Already on latest commit"
          fi

      - name: Setup Node.js
        if: steps.check-update.outputs.update_needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lzc-cli
        if: steps.check-update.outputs.update_needed == 'true'
        run: npm install -g @lazycatcloud/lzc-cli

      - name: Fetch upstream source
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          LATEST_COMMIT="${{ steps.get-version.outputs.latest_version }}"
          
          git clone --depth 1 --branch main https://github.com/${{ env.UPSTREAM_REPO }}.git /tmp/upstream
          cd /tmp/upstream
          git fetch --depth 1 origin +$LATEST_COMMIT
          git checkout $LATEST_COMMIT
          
          echo "Upstream source fetched at commit: $LATEST_COMMIT"

      - name: Build and push image
        if: steps.check-update.outputs.update_needed == 'true'
        id: build-image
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_COMMIT="${{ steps.get-version.outputs.latest_version }}"
          COMMIT_DATE="${{ steps.get-version.outputs.commit_date }}"
          
          cd /tmp/upstream

          LOCAL_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ env.PROJECT_NAME_LOWER }}:${LATEST_COMMIT}"
          LOCAL_IMAGE=$(echo "$LOCAL_IMAGE" | tr '[:upper:]' '[:lower:]')
          
          docker build \
            --build-arg VERSION=${LATEST_COMMIT} \
            --build-arg COMMIT=${LATEST_COMMIT} \
            --build-arg BUILD_DATE=${COMMIT_DATE} \
            -t "$LOCAL_IMAGE" .
          
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          docker push "$LOCAL_IMAGE"
          
          LOCAL_IMAGE_LATEST="ghcr.io/${{ github.repository_owner }}/${{ env.PROJECT_NAME_LOWER }}:latest"
          LOCAL_IMAGE_LATEST=$(echo "$LOCAL_IMAGE_LATEST" | tr '[:upper:]' '[:lower:]')
          docker tag "$LOCAL_IMAGE" "$LOCAL_IMAGE_LATEST"
          docker push "$LOCAL_IMAGE_LATEST"
          
          COPY_OUTPUT=$(lzc-cli appstore copy-image "$LOCAL_IMAGE_LATEST" 2>&1)
          echo "$COPY_OUTPUT"
          ACCELERATED_URL=$(echo "$COPY_OUTPUT" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          
          if [ -z "$ACCELERATED_URL" ]; then
            echo "Failed to get accelerated URL"
            exit 1
          fi
          
          echo "accelerated_url=$ACCELERATED_URL" >> $GITHUB_OUTPUT

      - name: Update manifest
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          ACCELERATED_URL="${{ steps.build-image.outputs.accelerated_url }}"
          LATEST_COMMIT="${{ steps.get-version.outputs.latest_version }}"
          
          sed -i "s|image:.*|image: $ACCELERATED_URL|g" lzc-manifest.yml
          sed -i "s|^version:.*|version: ${LATEST_COMMIT}|g" lzc-manifest.yml
          
          echo "Updated to commit: $LATEST_COMMIT"
          echo "Updated image: $ACCELERATED_URL"

      - name: Build package
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          lzc-cli project build -o ${{ env.PROJECT_NAME_LOWER }}.lpk

      - name: Publish to LazyCat App Store
        if: steps.check-update.outputs.update_needed == 'true' && inputs.publish_to_store == true
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          LATEST_COMMIT="${{ steps.get-version.outputs.latest_version }}"
          RELEASE_NOTES="Auto-build from CliRelay upstream commit: $LATEST_COMMIT"
          
          lzc-cli appstore publish ${{ env.PROJECT_NAME_LOWER }}.lpk --clang en -c "$RELEASE_NOTES"

      - name: Create GitHub Release
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_COMMIT="${{ steps.get-version.outputs.latest_version }}"
          COMMIT_DATE="${{ steps.get-version.outputs.commit_date }}"
          
          RELEASE_NOTES="Auto-build from CliRelay commit: $LATEST_COMMIT date: $COMMIT_DATE"
          
          gh release delete "build-$LATEST_COMMIT" --yes 2>/dev/null || true
          
          gh release create "build-$LATEST_COMMIT" \
            --title "Build $LATEST_COMMIT" \
            --notes "$RELEASE_NOTES" \
            ${{ env.PROJECT_NAME_LOWER }}.lpk

      - name: Commit and push changes
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          LATEST_COMMIT="${{ steps.get-version.outputs.latest_version }}"
          
          FILE_SHA=$(gh api repos/${{ github.repository }}/contents/lzc-manifest.yml --jq '.sha' 2>/dev/null || echo "")
          
          if [ -z "$FILE_SHA" ]; then
            echo "Failed to get file SHA"
            exit 1
          fi
          
          gh api -X PUT repos/${{ github.repository }}/contents/lzc-manifest.yml \
            -f message="Update CliRelay to commit $LATEST_COMMIT" \
            -f content="$(base64 -w 0 lzc-manifest.yml)" \
            -f sha="$FILE_SHA" \
            -f branch="${{ github.ref_name }}"
